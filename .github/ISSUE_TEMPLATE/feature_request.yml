name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please do not include credentials, cookies, tokens, or other secrets.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I have searched existing issues for similar requests.
          required: true
        - label: I understand this project uses unofficial Google Family Link endpoints.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or user experience you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workaround or different approach you have tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Home Assistant integration
        - Auth add-on or standalone auth container
        - Device controls
        - Schedule or time limits
        - Sensors or entity attributes
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add examples, screenshots, or links if useful.
