name: Bug report
description: Report a reproducible problem with the integration or auth service.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include Google account credentials, cookies, Home Assistant tokens, API keys, or session files.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I have searched existing issues for the same problem.
          required: true
        - label: I have removed secrets from logs and screenshots.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Integration version
      description: The HAFamilyLink version or commit you are running.
      placeholder: "1.2.9"
    validations:
      required: true

  - type: input
    id: home-assistant-version
    attributes:
      label: Home Assistant version
      placeholder: "2024.12.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual custom_component copy
        - Local development checkout
        - Other
    validations:
      required: true

  - type: dropdown
    id: auth-mode
    attributes:
      label: Authentication setup
      options:
        - Home Assistant add-on
        - Standalone Docker auth container
        - Local shared cookie file
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only the relevant log lines. Remove secrets first.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add screenshots, entity examples, or configuration details if useful.
