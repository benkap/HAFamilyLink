name: Build and Push Docker Image

on:
  pull_request:
    paths:
      - "familylink-playwright/**"
      - ".github/workflows/build-docker-image.yml"
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - "familylink-playwright/**"
      - ".github/workflows/build-docker-image.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/familylink-auth

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker ${{ matrix.image.label }} (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - id: addon
            label: add-on image
            file: ./familylink-playwright/Dockerfile
            cache_scope: addon
            summary_title: Home Assistant add-on image
          - id: standalone
            label: standalone image
            file: ./familylink-playwright/Dockerfile.standalone
            cache_scope: standalone
            summary_title: Standalone Docker image
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            platform_pair: linux-amd64
            run_on_pr: true
          - platform: linux/arm64
            platform_pair: linux-arm64
            run_on_pr: false

    steps:
      - name: Skip non-native PR platform
        if: github.event_name == 'pull_request' && !matrix.run_on_pr
        run: |
          {
            echo "## Docker ${{ matrix.image.label }} (${{ matrix.platform }})"
            echo ""
            echo "Skipped on pull requests to keep Docker feedback fast."
            echo "The arm64 image still builds on main, tags, releases, and manual runs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: github.event_name != 'pull_request' || matrix.run_on_pr
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: (github.event_name != 'pull_request' || matrix.run_on_pr) && matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request' || matrix.run_on_pr
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read auth version
        if: github.event_name != 'pull_request' || matrix.run_on_pr
        id: auth-version
        run: |
          version="$(python3 -c 'import json; print(json.load(open("familylink-playwright/config.json", encoding="utf-8"))["version"])')"
          case "$version" in
            *.*.*) ;;
            *) echo "Auth version must be semantic X.Y.Z: $version" >&2; exit 1 ;;
          esac
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          {
            echo "version=$version"
            echo "major=$major"
            echo "major_minor=$major.$minor"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Docker tags
        if: github.event_name != 'pull_request' || matrix.run_on_pr
        id: docker-tags
        run: |
          version="${{ steps.auth-version.outputs.version }}"
          major="${{ steps.auth-version.outputs.major }}"
          major_minor="${{ steps.auth-version.outputs.major_minor }}"
          release_tags=false
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            release_tags=true
          fi
          case "$GITHUB_REF" in
            refs/tags/v*) release_tags=true ;;
          esac

          {
            echo "tags<<EOF"
            if [ "${{ matrix.image.id }}" = "standalone" ]; then
              echo "type=ref,event=branch,suffix=-standalone"
              echo "type=ref,event=pr,suffix=-standalone"
              echo "type=raw,value=${version}-standalone,enable=${release_tags}"
              echo "type=raw,value=${major_minor}-standalone,enable=${release_tags}"
              echo "type=raw,value=standalone,enable=true"
            else
              echo "type=ref,event=branch"
              echo "type=ref,event=pr"
              echo "type=raw,value=${version},enable=${release_tags}"
              echo "type=raw,value=${major_minor},enable=${release_tags}"
              echo "type=raw,value=${major},enable=${release_tags}"
              echo "type=raw,value=latest,enable={{is_default_branch}}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        if: github.event_name != 'pull_request' || matrix.run_on_pr
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ steps.docker-tags.outputs.tags }}

      - name: Build image
        if: github.event_name == 'pull_request' && matrix.run_on_pr
        uses: docker/build-push-action@v5
        with:
          context: ./familylink-playwright
          file: ${{ matrix.image.file }}
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.cache_scope }}-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.cache_scope }}-${{ matrix.platform_pair }}

      - name: Build and push digest
        id: build
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./familylink-playwright
          file: ${{ matrix.image.file }}
          platforms: ${{ matrix.platform }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.cache_scope }}-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.cache_scope }}-${{ matrix.platform_pair }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.id }}-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Summary
        if: github.event_name != 'pull_request' || matrix.run_on_pr
        run: |
          {
            echo "## ${{ matrix.image.summary_title }} (${{ matrix.platform }})"
            echo ""
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Pull request build only; image was not published."
            else
              echo "Platform digest was published and will be attached to a manifest."
            fi
            echo ""
            echo "Tags:"
            echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  merge:
    name: Docker ${{ matrix.image.label }} manifest
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - id: addon
            label: add-on image
            summary_title: Home Assistant add-on image
          - id: standalone
            label: standalone image
            summary_title: Standalone Docker image

    steps:
      - name: Skip manifest publish on pull request
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## ${{ matrix.image.summary_title }} manifest"
            echo ""
            echo "Manifest publishing runs on main, tags, releases, and manual runs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4

      - name: Read auth version
        if: github.event_name != 'pull_request'
        id: auth-version
        run: |
          version="$(python3 -c 'import json; print(json.load(open("familylink-playwright/config.json", encoding="utf-8"))["version"])')"
          case "$version" in
            *.*.*) ;;
            *) echo "Auth version must be semantic X.Y.Z: $version" >&2; exit 1 ;;
          esac
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          {
            echo "version=$version"
            echo "major=$major"
            echo "major_minor=$major.$minor"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Docker tags
        if: github.event_name != 'pull_request'
        id: docker-tags
        run: |
          version="${{ steps.auth-version.outputs.version }}"
          major="${{ steps.auth-version.outputs.major }}"
          major_minor="${{ steps.auth-version.outputs.major_minor }}"
          release_tags=false
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            release_tags=true
          fi
          case "$GITHUB_REF" in
            refs/tags/v*) release_tags=true ;;
          esac

          {
            echo "tags<<EOF"
            if [ "${{ matrix.image.id }}" = "standalone" ]; then
              echo "type=ref,event=branch,suffix=-standalone"
              echo "type=ref,event=pr,suffix=-standalone"
              echo "type=raw,value=${version}-standalone,enable=${release_tags}"
              echo "type=raw,value=${major_minor}-standalone,enable=${release_tags}"
              echo "type=raw,value=standalone,enable=true"
            else
              echo "type=ref,event=branch"
              echo "type=ref,event=pr"
              echo "type=raw,value=${version},enable=${release_tags}"
              echo "type=raw,value=${major_minor},enable=${release_tags}"
              echo "type=raw,value=${major},enable=${release_tags}"
              echo "type=raw,value=latest,enable={{is_default_branch}}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download digests
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image.id }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ steps.docker-tags.outputs.tags }}

      - name: Create and push manifest
        if: github.event_name != 'pull_request'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## ${{ matrix.image.summary_title }} manifest"
            echo ""
            echo "Multi-platform manifest was published."
            echo ""
            echo "Tags:"
            echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
