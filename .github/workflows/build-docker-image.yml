name: Build and Push Docker Image

on:
  pull_request:
    paths:
      - "familylink-playwright/**"
      - ".github/workflows/build-docker-image.yml"
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - "familylink-playwright/**"
      - ".github/workflows/build-docker-image.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/familylink-auth

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-addon:
    name: Docker addon image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./familylink-playwright
          file: ./familylink-playwright/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=addon
          cache-to: type=gha,mode=max,scope=addon

      - name: Summary
        run: |
          {
            echo "## Home Assistant add-on image"
            echo ""
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Pull request build only; image was not published."
            else
              echo "Image was published."
            fi
            echo ""
            echo "Tags:"
            echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  build-standalone:
    name: Docker standalone image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-standalone
            type=ref,event=pr,suffix=-standalone
            type=semver,pattern={{version}},suffix=-standalone
            type=semver,pattern={{major}}.{{minor}},suffix=-standalone
            type=raw,value=standalone,enable=true

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./familylink-playwright
          file: ./familylink-playwright/Dockerfile.standalone
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=standalone
          cache-to: type=gha,mode=max,scope=standalone

      - name: Summary
        run: |
          {
            echo "## Standalone Docker image"
            echo ""
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Pull request build only; image was not published."
            else
              echo "Image was published."
            fi
            echo ""
            echo "Tags:"
            echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
