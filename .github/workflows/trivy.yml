name: Trivy

on:
  push:
    branches: ["main"]
    paths:
      - "familylink-playwright/**"
      - ".github/workflows/trivy.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "familylink-playwright/**"
      - ".github/workflows/trivy.yml"
  schedule:
    - cron: "26 5 * * 6" # Saturday 05:26 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Docker image vulnerability report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build add-on image
        run: docker build -t hafamilylink-auth-addon:${{ github.sha }} -f familylink-playwright/Dockerfile familylink-playwright

      - name: Scan add-on image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: hafamilylink-auth-addon:${{ github.sha }}
          scanners: vuln
          vuln-type: os,library
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Build standalone image
        run: docker build -t hafamilylink-auth-standalone:${{ github.sha }} -f familylink-playwright/Dockerfile.standalone familylink-playwright

      - name: Scan standalone image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: hafamilylink-auth-standalone:${{ github.sha }}
          scanners: vuln
          vuln-type: os,library
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
