name: Trivy

on:
  push:
    branches: ["main"]
    paths:
      - "familylink-playwright/**"
      - ".github/workflows/trivy.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "familylink-playwright/**"
      - ".github/workflows/trivy.yml"
  schedule:
    - cron: "26 5 * * 6" # Saturday 05:26 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Docker ${{ matrix.image.label }} vulnerability report
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - label: add-on image
            dockerfile: familylink-playwright/Dockerfile
            tag: hafamilylink-auth-addon
          - label: standalone image
            dockerfile: familylink-playwright/Dockerfile.standalone
            tag: hafamilylink-auth-standalone

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ matrix.image.tag }}:${{ github.sha }} -f ${{ matrix.image.dockerfile }} familylink-playwright

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image.tag }}:${{ github.sha }}
          scanners: vuln
          vuln-type: os,library
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
