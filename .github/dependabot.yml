version: 2

updates:
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/familylink-playwright"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      python-patches:
        patterns:
          - "*"
        update-types:
          - "patch"
        group-by: "dependency-name"
    ignore:
      - dependency-name: "aiohttp"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "cryptography"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "fastapi"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "playwright"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "pydantic"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "uvicorn"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

      # The Home Assistant 2024.3.3 test harness is resolver-sensitive.
      # Move these pins together only after an explicit harness upgrade.
      - dependency-name: "pytest"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "pytest-asyncio"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "pytest-cov"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "pytest-homeassistant-custom-component"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "coverage"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "habluetooth"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "bluetooth-data-tools"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
          - "version-update:semver-major"

  - package-ecosystem: "docker"
    directory: "/familylink-playwright"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:15"
      timezone: "UTC"
    open-pull-requests-limit: 3
    groups:
      docker-images:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "debian"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:30"
      timezone: "UTC"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
